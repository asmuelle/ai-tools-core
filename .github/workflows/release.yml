name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip crates.io publish)"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

permissions:
  contents: read

jobs:
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo test --all-features --locked
      - name: Verify tag matches crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CRATE_VER=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name=="ai-tools-core") | .version')
          if [[ "$TAG" != "$CRATE_VER" ]]; then
            echo "::error::Tag $TAG does not match ai-tools-core version $CRATE_VER"
            exit 1
          fi

  msrv:
    name: MSRV (1.95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features --locked

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features --locked
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc/

  crates-io:
    name: Publish to crates.io
    needs: [verify, msrv]
    if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: Publish ai-tools-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version=$(cargo metadata --format-version=1 --no-deps \
            | jq -er '.packages[] | select(.name=="ai-tools-core") | .version')
          echo "::group::publish ai-tools-core v$version"

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::notice::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            echo "::endgroup::"
            exit 0
          fi

          url="https://crates.io/api/v1/crates/ai-tools-core/$version"
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -A "ai-tools-core-ci (+https://github.com/${GITHUB_REPOSITORY})" \
            "$url")
          case "$code" in
            200)
              echo "ai-tools-core@$version already on crates.io — skipping"
              ;;
            404)
              cargo publish --locked
              ;;
            *)
              echo "::error::Unexpected HTTP $code from $url" >&2
              exit 1
              ;;
          esac
          echo "::endgroup::"
